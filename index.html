  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

  /* Animations */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseDot {
    0%, 100% { opacity: .4; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.2); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes streamIn {
    from { opacity: 0; filter: blur(2px); }
    to   { opacity: 1; filter: blur(0); }
  }
  .shimmer {
    background: linear-gradient(90deg,

      rgba(255,255,255,0.06) 50%,
      rgba(255,255,255,0.02) 100%);
    background-size: 800px 100%;
    animation: shimmer 1.6s linear infinite;

window.useTweaks = function(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((k, v) => setValues(p => ({...p, [k]: v})), []);
  return [values, setTweak];
};

window.TweaksPanel = ({ title, children }) => (
  <div style={{ position: 'fixed', bottom: 16, right: 16, background: 'var(--panel)', border: '1px solid var(--border-hi)', borderRadius: 12, padding: 16, width: 300, boxShadow: '0 8px 32px rgba(0,0,0,0.5)', zIndex: 1000, animation: 'fadeIn 0.3s ease-out' }}>
    <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14, color: 'var(--text)', borderBottom: '1px solid var(--border)', paddingBottom: 8 }}>{title}</div>
    {children}

);

window.TweakSection = ({ label, children }) => (
  <div style={{ marginBottom: 16 }}>
    <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, color: 'var(--muted)', marginBottom: 8, fontWeight: 600 }}>{label}</div>
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>{children}</div>

);

window.TweakButton = ({ label, onClick }) => (
  <button onClick={onClick} style={{ background: 'var(--bg-2)', border: '1px solid var(--border)', color: 'var(--text)', padding: '6px 8px', borderRadius: 6, fontSize: 11, cursor: 'pointer', flex: '1 1 45%', transition: 'background 0.2s' }} onMouseEnter={e => e.target.style.background='var(--panel-hi)'} onMouseLeave={e => e.target.style.background='var(--bg-2)'}>{label}</button>
);

window.TweakColor = ({ label, value, onChange, options }) => (
  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%' }}>
    <span style={{ fontSize: 13, color: 'var(--text)' }}>{label}</span>
    <div style={{ display: 'flex', gap: 6 }}>

      ))}

);

const Icon = ({ name, size = 16, className = "", style = {} }) => {
  const s = { width: size, height: size, ...style };
  const stroke = "currentColor";
  const sw = 1.6;
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke, strokeWidth: sw, strokeLinecap: "round", strokeLinejoin: "round", className, style };
  switch (name) {
    case "search":   return <svg {...common}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>;
    case "sparkle":  return <svg {...common}><path d="M12 3v6m0 6v6M3 12h6m6 0h6M5.6 5.6l4.2 4.2m4.4 4.4 4.2 4.2M5.6 18.4l4.2-4.2m4.4-4.4 4.2-4.2"/></svg>;
    case "star":     return <svg {...common}><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9l-5.3 2.7 1-5.8-4.3-4.1 5.9-.9z"/></svg>;
    case "star-fill":return <svg {...common} fill={stroke}><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9l-5.3 2.7 1-5.8-4.3-4.1 5.9-.9z"/></svg>;
    case "arrow":    return <svg {...common}><path d="M5 12h14m-6-6 6 6-6 6"/></svg>;
    case "back":     return <svg {...common}><path d="M19 12H5m6 6-6-6 6-6"/></svg>;
    case "download": return <svg {...common}><path d="M12 4v12m-5-5 5 5 5-5M4 20h16"/></svg>;
    case "chevron":  return <svg {...common}><path d="m6 9 6 6 6-6"/></svg>;
    case "x":        return <svg {...common}><path d="M6 6l12 12M18 6 6 18"/></svg>;
    case "info":     return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/></svg>;
    case "warn":     return <svg {...common}><path d="M12 3 2 20h20zM12 10v4m0 3h.01"/></svg>;
    case "retry":    return <svg {...common}><path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5"/></svg>;
    case "calendar": return <svg {...common}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4m8-4v4"/></svg>;
    case "pin":      return <svg {...common}><path d="M12 22s7-7.5 7-13a7 7 0 0 0-14 0c0 5.5 7 13 7 13Z"/><circle cx="12" cy="9" r="2.5"/></svg>;
    case "check":    return <svg {...common}><path d="m5 13 4 4L19 7"/></svg>;
    case "doc":      return <svg {...common}><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6M9 13h6M9 17h4"/></svg>;
    case "copy":     return <svg {...common}><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>;
    case "save":     return <svg {...common}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>;
    case "filter":   return <svg {...common}><path d="M3 5h18l-7 9v6l-4-2v-4z"/></svg>;
    case "lightning":return <svg {...common}><path d="M13 2 4 14h7l-1 8 9-12h-7z"/></svg>;
    default: return null;
  }
};

const Pill = ({ children, tone = "default", style }) => {
  const palettes = {
    default: { bg: "rgba(255,255,255,0.04)", color: "var(--text-2)", border: "1px solid var(--border)" },
    gold:    { bg: "var(--gold-soft)",       color: "var(--gold-hi)",  border: "1px solid var(--gold-line)" },
    green:   { bg: "rgba(74,222,128,0.10)",  color: "#9be3b3",         border: "1px solid rgba(74,222,128,0.25)" },
    state:   { bg: "rgba(255,255,255,0.03)", color: "var(--text)",     border: "1px solid var(--border-hi)" },
  };
  const p = palettes[tone] || palettes.default;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      padding: "3px 9px", borderRadius: 999, fontSize: 12, fontWeight: 500,
      letterSpacing: 0.1,
      ...p, ...style,
    }}>{children}</span>
  );
};

const Button = ({ variant = "primary", size = "md", icon, iconRight, children, onClick, disabled, style = {}, fullWidth, title }) => {
  const sizes = {
    sm: { padding: "6px 12px", fontSize: 12, height: 28, gap: 6, iconSize: 14 },
    md: { padding: "9px 16px", fontSize: 13, height: 36, gap: 8, iconSize: 16 },
    lg: { padding: "14px 22px", fontSize: 15, height: 50, gap: 10, iconSize: 18 },
  };
  const sz = sizes[size] || sizes.md;
  const variants = {
    primary: {
      background: "var(--gold)", color: "#1c1300", border: "1px solid var(--gold)",
      fontWeight: 600, boxShadow: "0 1px 0 rgba(255,255,255,0.25) inset, 0 1px 2px rgba(0,0,0,0.3)",
    },
    primaryHover: { background: "var(--gold-hi)" },
    secondary: {
      background: "rgba(255,255,255,0.02)", color: "var(--text)",
      border: "1px solid var(--border-hi)", fontWeight: 500,
    },
    ghost: { background: "transparent", color: "var(--text-2)", border: "1px solid transparent", fontWeight: 500 },
    danger: { background: "transparent", color: "var(--red)", border: "1px solid rgba(239,94,94,0.35)", fontWeight: 500 },
    icon: { background: "transparent", color: "var(--text-2)", border: "1px solid transparent", padding: 6 },
  };
  const v = variants[variant] || variants.primary;
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick} disabled={disabled} title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center", gap: sz.gap,
        padding: variant === "icon" ? 6 : sz.padding,
        height: variant === "icon" ? "auto" : sz.height,
        fontSize: sz.fontSize, borderRadius: 8,
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.5 : 1,
        transition: "background 120ms, border-color 120ms, transform 80ms",
        width: fullWidth ? "100%" : undefined,
        ...v,
        ...(hover && variant === "primary" ? { background: "var(--gold-hi)" } : {}),
        ...(hover && variant === "secondary" ? { borderColor: "var(--gold-line)" } : {}),
        ...(hover && variant === "ghost" ? { color: "var(--text)", background: "rgba(255,255,255,0.04)" } : {}),
        ...style,
      }}
    >
      {icon && <Icon name={icon} size={sz.iconSize} />}
      {children}
      {iconRight && <Icon name={iconRight} size={sz.iconSize} />}
    </button>
  );
};

const Field = ({ label, hint, error, children, optional }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
      <label style={{ fontSize: 13, fontWeight: 500, color: "var(--text)" }}>
        {label} {optional && <span style={{ color: "var(--muted)", fontWeight: 400 }}>· optional</span>}
      </label>
    </div>
    {children}
    {hint && !error && <div style={{ fontSize: 12, color: "var(--muted)" }}>{hint}</div>}
    {error && <div style={{ fontSize: 12, color: "var(--red)" }}>{error}</div>}
  </div>
);

const inputStyle = {
  width: "100%", background: "var(--bg-2)", border: "1px solid var(--border)",
  borderRadius: 8, padding: "11px 14px", fontSize: 14, color: "var(--text)",
  outline: "none", transition: "border-color 120ms, box-shadow 120ms, background 120ms",
};
const focusedInputStyle = {
  borderColor: "var(--gold-line)", boxShadow: "0 0 0 3px rgba(240,200,80,0.08)", background: "var(--bg-2)",
};

const TextInput = ({ prefix, value, onChange, placeholder, type = "text" }) => {
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ display: "flex", alignItems: "center", ...inputStyle, padding: 0, ...(focus ? focusedInputStyle : {}) }}>
      {prefix && <span style={{ paddingLeft: 14, color: "var(--muted)", fontSize: 14 }}>{prefix}</span>}
      <input
        type={type} value={value || ""}
        onChange={e => onChange?.(e.target.value)}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        placeholder={placeholder}
        style={{ flex: 1, background: "transparent", border: "none", outline: "none", padding: "11px 14px", paddingLeft: prefix ? 8 : 14, color: "var(--text)", fontSize: 14, fontFamily: "inherit" }}
      />
    </div>
  );
};

const Textarea = ({ value, onChange, placeholder, rows = 4 }) => {
  const [focus, setFocus] = React.useState(false);
  return (
    <textarea
      value={value || ""} onChange={e => onChange?.(e.target.value)}
      onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
      placeholder={placeholder} rows={rows}
      style={{ ...inputStyle, resize: "vertical", minHeight: 120, lineHeight: 1.55, ...(focus ? focusedInputStyle : {}) }}
    />
  );
};

const Select = ({ value, onChange, options, placeholder }) => {
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ position: "relative" }}>
      <select
        value={value || ""} onChange={e => onChange?.(e.target.value)}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        style={{ ...inputStyle, appearance: "none", paddingRight: 38, cursor: "pointer", ...(focus ? focusedInputStyle : {}) }}
      >
        <option value="">{placeholder || "Select…"}</option>
        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
      </select>
      <div style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "var(--muted)", pointerEvents: "none" }}>
        <Icon name="chevron" size={16} />
      </div>
    </div>
  );
};

const MultiStateSelect = ({ value = [], onChange }) => {
  const [open, setOpen] = React.useState(false);
  const [q, setQ] = React.useState("");
  const ref = React.useRef(null);
  React.useEffect(() => {
    const handler = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);
  const filtered = window.STATES.filter(([abbr, name]) => {
    if (!q) return true;
    const s = q.toLowerCase();
    return abbr.toLowerCase().includes(s) || name.toLowerCase().includes(s);
  });
  const toggle = (abbr) => {
    onChange(value.includes(abbr) ? value.filter(s => s !== abbr) : [...value, abbr]);
  };
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <div
        onClick={() => setOpen(o => !o)}
        style={{ ...inputStyle, padding: "8px 10px", minHeight: 44, cursor: "text", display: "flex", flexWrap: "wrap", alignItems: "center", gap: 6, ...(open ? focusedInputStyle : {}) }}
      >
        {value.length === 0 && <span style={{ color: "var(--muted)", padding: "3px 4px" }}>Select states…</span>}
        {value.map(abbr => (
          <span key={abbr} style={{ display: "inline-flex", alignItems: "center", gap: 4, background: "var(--gold-soft)", color: "var(--gold-hi)", border: "1px solid var(--gold-line)", padding: "3px 4px 3px 9px", borderRadius: 999, fontSize: 12, fontWeight: 600 }}>
            {abbr}
            <button onClick={(e) => { e.stopPropagation(); toggle(abbr); }} style={{ background: "transparent", border: "none", padding: 2, color: "inherit", cursor: "pointer", display: "flex" }} aria-label={`Remove ${abbr}`}><Icon name="x" size={12} /></button>
          </span>
        ))}
        <input
          value={q} onChange={e => setQ(e.target.value)} onFocus={() => setOpen(true)}
          placeholder={value.length === 0 ? "" : "Add…"}
          style={{ background: "transparent", border: "none", outline: "none", flex: 1, minWidth: 60, color: "var(--text)", padding: "4px 6px", fontSize: 13 }}
        />
      </div>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "var(--panel)", border: "1px solid var(--border-hi)", borderRadius: 8, boxShadow: "0 8px 32px rgba(0,0,0,0.5)", zIndex: 20, maxHeight: 260, overflow: "auto", padding: 6, animation: "fadeIn 120ms ease-out" }}>
          {filtered.length === 0 && <div style={{ padding: 10, color: "var(--muted)", fontSize: 13 }}>No matches</div>}
          {filtered.map(([abbr, name]) => {
            const selected = value.includes(abbr);
            return (
              <div
                key={abbr} onClick={() => toggle(abbr)}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 10px", borderRadius: 6, cursor: "pointer", fontSize: 13, background: selected ? "var(--gold-soft)" : "transparent", color: selected ? "var(--gold-hi)" : "var(--text)" }}
                onMouseEnter={e => { if (!selected) e.currentTarget.style.background = "rgba(255,255,255,0.04)"; }}
                onMouseLeave={e => { if (!selected) e.currentTarget.style.background = "transparent"; }}
              >
                <span style={{ width: 16, height: 16, borderRadius: 4, border: "1px solid " + (selected ? "var(--gold)" : "var(--border-hi)"), background: selected ? "var(--gold)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", color: "#1c1300" }}>{selected && <Icon name="check" size={12} />}</span>
                <span className="mono" style={{ width: 26, color: "var(--muted)", fontSize: 11 }}>{abbr}</span>
                <span>{name}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

const ScoreBadge = ({ score, breakdown, large = false }) => {

  const tone = score >= 80 ? "green" : score >= 60 ? "amber" : "gray";
  const colors = {
    green: { bg: "rgba(74,222,128,0.12)", color: "#9be3b3", ring: "rgba(74,222,128,0.4)" },
    amber: { bg: "rgba(245,185,66,0.12)", color: "#f0c46d", ring: "rgba(245,185,66,0.4)" },
    gray:  { bg: "rgba(255,255,255,0.04)", color: "var(--text-2)", ring: "var(--border-hi)" },

  const c = colors[tone];
  return (
    <div style={{ position: "relative", display: "inline-flex" }} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: large ? "8px 12px" : "5px 10px", background: c.bg, color: c.color, border: "1px solid " + c.ring, borderRadius: 8, fontWeight: 700, fontSize: large ? 18 : 14, fontVariantNumeric: "tabular-nums", cursor: "help" }}>
        <span style={{ width: 6, height: 6, borderRadius: 999, background: c.color, opacity: 0.8 }} />
        {score}
        <span style={{ fontSize: large ? 12 : 10, opacity: 0.65, fontWeight: 500, letterSpacing: 0.5 }}>SCORE</span>
      </div>
      {hover && breakdown && (
        <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, minWidth: 260, background: "#0a1e15", border: "1px solid var(--border-hi)", borderRadius: 10, padding: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.6)", zIndex: 30, animation: "fadeIn 120ms ease-out" }}>
          <div style={{ fontSize: 10, letterSpacing: 1, textTransform: "uppercase", color: "var(--muted)", marginBottom: 8, fontWeight: 600 }}>Score breakdown</div>
          {[
            ["Geo match",         breakdown.geo,      20],
            ["Org type",          breakdown.org,      25],
            ["Tech tag overlap",  breakdown.tags,     25],
            ["Funding alignment", breakdown.funding,  15],
            ["Deadline urgency",  breakdown.deadline, 10],
            ["Description match", breakdown.fts,      5 ],
          ].map(([label, val, max]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 10, padding: "4px 0", fontSize: 12 }}>

              <div style={{ width: 60, height: 4, borderRadius: 999, background: "var(--border)", overflow: "hidden" }}>
                <div style={{ width: `${(val / max) * 100}%`, height: "100%", background: c.color, opacity: 0.7 }}/>
              </div>
              <div className="mono" style={{ width: 42, textAlign: "right", color: "var(--text)", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{val}/{max}</div>

          <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", fontSize: 12 }}>
            <span style={{ color: "var(--muted)" }}>Deterministic — auditable</span>
            <span className="mono" style={{ color: c.color, fontWeight: 700 }}>= {score}/100</span>
          </div>
        </div>
      )}
    </div>
  );
};

        <div style={{ fontSize: 11, color: "var(--muted)" }} className="mono">{isError ? "ERROR" : streaming ? "STREAMING" : "READY"}</div>
      </div>
      <div style={{ padding: 18, overflowY: "auto", flex: 1 }}>
        {isError ? <ErrorBlock onRetry={onRetry} /> : <StrategyBody strategy={strategy} streaming={streaming} onCopy={onCopy} copied={copied} />}
      </div>
      <div style={{ padding: 14, borderTop: "1px solid var(--border)", background: "var(--bg-2)", display: "flex", flexDirection: "column", gap: 8 }}>
        <Button variant="primary" size="md" icon="download" fullWidth onClick={onExport}>Download PDF Report</Button>
        <Button variant="ghost" size="sm" icon="save" fullWidth onClick={onSaveSearch}>Save this search</Button>

};

const ErrorBlock = ({ onRetry }) => (
  <div style={{ textAlign: "center", padding: "8px 4px" }}>
    <div style={{ width: 44, height: 44, borderRadius: 999, margin: "0 auto 12px", background: "rgba(239,94,94,0.12)", color: "var(--red)", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="warn" size={20} /></div>

    <div style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.5, marginBottom: 14 }}>Gemini 2.5 Pro returned a 5xx. The ranked grants below are deterministic — they don't depend on the LLM.</div>

    <div className="mono" style={{ fontSize: 10, color: "var(--muted)", marginTop: 16 }}>auto-failover to Claude Sonnet 4.6 in 4s</div>
  </div>
);

const StrategyBody = ({ strategy, streaming, onCopy, copied }) => {
  const [phase, setPhase] = React.useState(streaming ? 0 : 3);
  React.useEffect(() => {
    if (!streaming) { setPhase(3); return; }
    const t1 = setTimeout(() => setPhase(1), 700);
    const t2 = setTimeout(() => setPhase(2), 1500);
    const t3 = setTimeout(() => setPhase(3), 2500);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, [streaming]);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      <section style={{ animation: "streamIn 300ms both" }}>
        <SectionTitle>Funding overview</SectionTitle>
        <p style={{ fontSize: 13, lineHeight: 1.65, color: "var(--text-2)", margin: 0 }}>{strategy.overview}</p>
      </section>
      {phase >= 1 && (
        <section style={{ animation: "streamIn 300ms both" }}>
          <SectionTitle>Per-grant strategy</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {strategy.perGrant.slice(0, phase >= 2 ? strategy.perGrant.length : 2).map((g, i) => {
              const grant = window.SAMPLE_GRANTS.find(x => x.id === g.id);
              return (
                <div key={g.id} style={{ borderLeft: "2px solid var(--gold-line)", paddingLeft: 12, animation: "streamIn 300ms both", animationDelay: `${i * 80}ms` }}>
                  <div style={{ fontWeight: 600, fontSize: 12, color: "var(--gold)", marginBottom: 4 }}>→ {grant?.title?.split(" — ")[0] || g.id}</div>
                  <div style={{ fontSize: 12.5, color: "var(--text-2)", lineHeight: 1.55, marginBottom: 4 }}>{g.note}</div>
                  <div style={{ fontSize: 11.5, color: "var(--muted)", fontStyle: "italic" }}>Action: {g.action}</div>
                </div>
              );
            })}
          </div>
        </section>
      )}
      {phase >= 3 ? (
        <section style={{ animation: "streamIn 300ms both" }}>
          <SectionTitle>
            <span>Prospect message starter</span>
            <button onClick={onCopy} style={{ background: "transparent", border: "1px solid var(--border-hi)", borderRadius: 6, padding: "2px 8px", height: 22, fontSize: 11, color: copied ? "var(--green)" : "var(--text-2)", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4 }}><Icon name={copied ? "check" : "copy"} size={11} /> {copied ? "Copied" : "Copy"}</button>

            <div className="shimmer" style={{ height: 10, width: "85%", borderRadius: 4, background: "var(--border)" }} />
            <div className="shimmer" style={{ height: 10, width: "70%", borderRadius: 4, background: "var(--border)" }} />
          </div>

const ResultsScreen = ({ params, grants, scenario, onEdit, onExport, onLLMRetry, llmError }) => {
  const [saved, setSaved] = React.useState(new Set());
  const [streaming, setStreaming] = React.useState(!llmError);
  const [copied, setCopied] = React.useState(false);
  const cardRefs = React.useRef({});

  React.useEffect(() => {
    if (llmError) { setStreaming(false); return; }
    setStreaming(true);
    const t = setTimeout(() => setStreaming(false), 2700);
    return () => clearTimeout(t);
  }, [llmError, scenario]);

  const toggleSave = (id) => {
    setSaved(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const copyOutreach = () => {
    navigator.clipboard?.writeText(window.TOP_STRATEGY.outreach).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  const jumpToCard = (id) => {
    const el = cardRefs.current[id];

          <Button variant="secondary" size="sm" icon="filter">Refine</Button>
          <Button variant="ghost" size="sm" icon="retry" onClick={onLLMRetry} title="Simulate LLM error retry">Re-run AI</Button>
        </div>
      </div>
      {llmError && (
        <div style={{ padding: "10px 14px", borderRadius: 8, marginBottom: 18, background: "rgba(239,94,94,0.06)", border: "1px solid rgba(239,94,94,0.2)", color: "#ffb3b3", fontSize: 12.5, display: "flex", alignItems: "center", gap: 10 }}><Icon name="warn" size={14} /> <span>Showing ranked grant matches. AI analysis will be available shortly.</span></div>
      )}

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {grants.map((g, i) => {
            const hasNote = window.TOP_STRATEGY.perGrant.find(p => p.id === g.id);
            return (
              <div key={g.id} ref={el => cardRefs.current[g.id] = el} style={{ transition: "box-shadow 200ms", borderRadius: 12 }}>
                <GrantCard grant={g} saved={saved.has(g.id)} onSave={toggleSave} onJump={hasNote ? jumpToCard : null} />
              </div>
            );
          })}
        </div>
        <StrategyPanel strategy={window.TOP_STRATEGY} streaming={streaming} llmError={llmError} onRetry={onLLMRetry} onExport={onExport} onSaveSearch={() => {}} onCopy={copyOutreach} copied={copied} />
      </div>
    </div>
  );
};

/* APP (Main state machine & Tweak panel)                                     */

const DEFAULT_PARAMS = {
  project: "A school district in Ohio deploying AI-powered surveillance cameras across 12 campuses, with integrated threat detection, access control hardening, and staff training over a 24-month rollout.",
  orgType: "School District",
  states: ["OH"],
  funding: "2,400,000",
};

const DEFAULTS = {
  "scenario": "happy",
  "accent": "#f0c850",
  "panelDensity": "comfortable",
  "showAINotes": true,
  "scoreStyle": "badge",
  "strategyPosition": "right"
};

function App() {
  const [screen, setScreen] = React.useState("form"); // form | loading | results | empty
  const [params, setParams] = React.useState(DEFAULT_PARAMS);
  const [pdfOpen, setPdfOpen] = React.useState(false);
  const [llmError, setLlmError] = React.useState(false);

  const [tweaks, setTweak] = window.useTweaks(DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--gold", tweaks.accent);
  }, [tweaks.accent]);

  React.useEffect(() => {
    if (tweaks.scenario === "llm-error") setLlmError(true);
    else setLlmError(false);
  }, [tweaks.scenario]);

  const runSearch = (next) => {
    setParams(next);
    setScreen("loading");
    setTimeout(() => setScreen("results"), 2000);
  };

  const runZeroPath = (next) => {
    setParams(next);
    setScreen("loading");
    setTimeout(() => setScreen("empty"), 1700);
  };

  const retryLLM = () => {
    setLlmError(false);
    setScreen("loading");
    setTimeout(() => setScreen("results"), 1400);
  };

  const grants = React.useMemo(() => [...window.SAMPLE_GRANTS].sort((a, b) => b.score - a.score), []);

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)" }}>
      <window.TopNav active="AI Search" onNav={(n) => { if (n !== "AI Search") return; setScreen("form"); }} />

      {screen === "form" && <window.SearchForm initial={params} onSubmit={runSearch} onZeroPath={runZeroPath} />}
      {screen === "loading" && <window.LoadingScreen params={params} />}
      {screen === "results" && <window.ResultsScreen params={params} grants={grants} scenario={tweaks.scenario} llmError={llmError} onEdit={() => setScreen("form")} onExport={() => setPdfOpen(true)} onLLMRetry={retryLLM} />}
      {screen === "empty" && <window.EmptyState params={params} onBroaden={() => runSearch({ ...params, states: [] })} onEdit={() => setScreen("form")} />}
      {pdfOpen && <window.PDFPreview params={params} grants={grants} strategy={window.TOP_STRATEGY} onClose={() => setPdfOpen(false)} />}

      <TweaksUI
        tweaks={tweaks}
        setTweak={setTweak}
        onJump={(s) => {
          if (s === "form") setScreen("form");
          if (s === "loading") setScreen("loading");
          if (s === "results") { setLlmError(false); setScreen("results"); }
          if (s === "empty") { setParams({ ...params }); setScreen("empty"); }
          if (s === "pdf")   { setScreen("results"); setPdfOpen(true); }
          if (s === "llm-error") { setLlmError(true); setScreen("results"); }
        }}
      />
    </div>
  );
}

const TweaksUI = ({ tweaks, setTweak, onJump }) => {
  const { TweaksPanel, TweakSection, TweakColor, TweakButton } = window;
  return (
    <TweaksPanel title="Tweaks · AI Search">
      <TweakSection label="Jump to screen">
        <TweakButton label="1 · Form" onClick={() => onJump("form")} />
        <TweakButton label="2 · Loading" onClick={() => onJump("loading")} />
        <TweakButton label="3 · Results" onClick={() => onJump("results")} />
        <TweakButton label="4 · PDF Preview" onClick={() => onJump("pdf")} />
        <TweakButton label="5 · Empty State" onClick={() => onJump("empty")} />
        <TweakButton label="6 · LLM Error" onClick={() => onJump("llm-error")} />
      </TweakSection>

      <TweakSection label="Theme">
        <TweakColor
          label="Accent"
          value={tweaks.accent}
          onChange={(v) => setTweak("accent", v)}
          options={["#f0c850", "#a3e635", "#7fb4e0", "#e08a5b", "#c08af0"]}
        />
      </TweakSection>
    </TweaksPanel>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
